<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Student Management System</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 30px;
            border-radius: 18px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .login-btn {
            border-radius: 10px;
            padding: 12px;
            font-size: 20px;
        }

        .register-link {
            text-decoration: none;
            font-weight: 600;
        }

        .register-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-card">

    <!-- Heading -->
    <div class="text-center mb-4">
        <h1 class="fw-bold text-primary">SSMS Login</h1>
        <p class="text-muted">Enter your credentials to continue</p>
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert"
                    aria-label="Close">
            </button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Login Form -->
    <form action="/login" method="POST">

        <div class="mb-3">
            <label class="form-label fs-5">Username</label>
            <input
                type="text"
                name="username"
                class="form-control form-control-lg"
                placeholder="Enter username"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label fs-5">Password</label>
            <input
                type="password"
                name="password"
                class="form-control form-control-lg"
                placeholder="••••••••"
                required>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg login-btn">
                Login
            </button>
        </div>

    </form>

    <!-- Register Link -->
    <div class="mt-4 text-center">
        <span class="text-muted">Don't have an account?</span>
        <a href="/register" class="register-link text-primary ms-1">
            Register Here
        </a>
    </div>

    <!-- Footer -->
    <div class="mt-4 text-center">
        <small class="text-muted">
            Smart Student Management System © 2026
        </small>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

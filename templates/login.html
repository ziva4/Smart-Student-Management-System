<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Student Management System</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 15px;

            /* FIXED BUG HERE */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="login-card bg-white">

    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">SSMS Login</h2>
        <p class="text-muted">Enter your credentials to continue</p>
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- LOGIN FORM -->
    <form action="/login" method="POST">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Login</button>
        </div>

    </form>

    <!-- REGISTER LINK (IMPORTANT PART YOU WANTED) -->
    <div class="mt-4 text-center">
        <p class="text-muted mb-1">Don't have an account?</p>
        <a href="/register" class="btn btn-outline-secondary btn-sm">Register Here</a>
    </div>

    <div class="mt-3 text-center">
        <small class="text-muted">Smart Student Management System © 2026</small>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

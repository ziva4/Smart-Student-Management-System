{% extends 'layout.html' %}
{% block content %}

<h3>Pending Teachers</h3>
{% for t in pending_teachers %}
<p>{{ t.username }}
<a href="/approve_teacher/{{ t.id }}" class="btn btn-success btn-sm">Approve</a>
</p>
{% endfor %}

<hr>

<h3>Pending Marks</h3>
{% for m in pending_marks %}
<p>{{ m.subject }} - {{ m.score }}
<a href="/approve_mark/{{ m.id }}" class="btn btn-primary btn-sm">Approve</a>
</p>
{% endfor %}

{% endblock %}

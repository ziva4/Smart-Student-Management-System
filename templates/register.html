<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Register - SSMS</title>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container card shadow-sm p-4" style="max-width: 400px;">
        <h3 class="text-center text-primary">Create Account</h3>
        <form method="POST">
            <div class="mb-3"><label>Full Name</label><input type="text" name="name" class="form-control" required></div>
            <div class="mb-3"><label>Username</label><input type="text" name="username" class="form-control" required></div>
            <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
            <div class="mb-3">
                <label>Register as:</label>
                <select name="role" class="form-select">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>
            <button class="btn btn-primary w-100">Register</button>
        </form>
        <p class="text-center mt-3"><a href="/login">Back to Login</a></p>
    </div>
</body>
</html>
